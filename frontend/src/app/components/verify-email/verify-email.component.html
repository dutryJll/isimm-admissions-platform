<div class="verify-page">
  <div class="verify-card">
    <h1>Verification Email</h1>

    <div *ngIf="state === 'loading'" class="state loading">
      <p>{{ message }}</p>
    </div>

    <div *ngIf="state === 'success'" class="state success">
      <h2>Email verifie</h2>
      <p>{{ message }}</p>
      <button type="button" (click)="goToLogin()">Se connecter</button>
    </div>

    <div *ngIf="state === 'error'" class="state error">
      <h2>Verification impossible</h2>
      <p>{{ message }}</p>
      <button type="button" (click)="goToLogin()">Connexion generale</button>
    </div>
  </div>
</div>
