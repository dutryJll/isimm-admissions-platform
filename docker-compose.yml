version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: isimm-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-isimm_db}
      POSTGRES_USER: ${DB_USER:-isimm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    networks:
      - isimm_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-isimm_user}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Auth Service (Django)
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: isimm-auth-service
    environment:
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: postgresql://${DB_USER:-isimm_user}:${DB_PASSWORD:-secure_password_change_me}@db:5432/${DB_NAME:-isimm_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,auth-service,gateway}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:80}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/auth-service:/app
      - auth_logs:/app/logs
    ports:
      - '8001:8001'
    expose:
      - '8001'
    networks:
      - isimm_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/api/auth/health/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # User Service (Django)
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: isimm-user-service
    environment:
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: postgresql://${DB_USER:-isimm_user}:${DB_PASSWORD:-secure_password_change_me}@db:5432/${DB_NAME:-isimm_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,user-service,gateway}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:80}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/user-service:/app
      - user_logs:/app/logs
    ports:
      - '8002:8002'
    expose:
      - '8002'
    networks:
      - isimm_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8002"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8002/api/health/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Candidature Service (Django + Daphne ASGI)
  candidature-service:
    build:
      context: ./services/candidature_service
      dockerfile: Dockerfile
    container_name: isimm-candidature-service
    environment:
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: postgresql://${DB_USER:-isimm_user}:${DB_PASSWORD:-secure_password_change_me}@db:5432/${DB_NAME:-isimm_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,candidature-service,gateway}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:80}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DAPHNE_BIND: 0.0.0.0
      DAPHNE_PORT: 8003
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/candidature_service:/app
      - candidature_logs:/app/logs
      - candidature_media:/app/media
      - candidature_static:/app/static
    ports:
      - '8003:8003'
    expose:
      - '8003'
    networks:
      - isimm_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8003 candidature_service.asgi:application"
    healthcheck:
      test:
        ['CMD', 'curl', '-f', 'http://localhost:8003/api/candidatures/health/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Nginx Gateway/Reverse Proxy
  gateway:
    image: nginx:alpine
    container_name: isimm-gateway
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - gateway_logs:/var/log/nginx
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - auth-service
      - user-service
      - candidature-service
    networks:
      - isimm_network
    environment:
      TZ: ${TIMEZONE:-UTC}
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  isimm_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
  auth_logs:
    driver: local
  user_logs:
    driver: local
  candidature_logs:
    driver: local
  candidature_media:
    driver: local
  candidature_static:
    driver: local
  gateway_logs:
    driver: local
